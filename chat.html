<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Chat App</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        #wrapper {
            max-width: 800px;
            margin: auto;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
        }

        #menu {
            background: #2563eb;
            color: #fff;
            padding: 15px;
        }

        #chatbox {
            height: 500px;
            overflow-y: auto;
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        #messages {
            list-style: none;
        }

        #messages li {
            padding: 10px;
            margin-bottom: 8px;
            background: #f3f4f6;
            border-radius: 6px;
        }

        .delete-btn {
            float: right;
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        form {
            display: flex;
            padding: 15px;
            gap: 10px;
        }

        #message {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .button {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="wrapper">

    <div id="menu">
        <p>Welcome, Chat App</p>
    </div>

    <div id="chatbox">
        <ul id="messages"></ul>
    </div>

    <form id="chatForm">
        <input
                type="text"
                id="message"
                placeholder="Text Message"
                autocomplete="off"
        />
        <button type="submit" class="button">Send</button>
    </form>

</div>

<script type="module">

    import { initializeApp }
        from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

    import {
        getDatabase,
        ref,
        push,
        set,
        remove,
        onChildAdded,
        onChildRemoved
    }
        from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBCN-yOjN0CYjdskON8kOzELYELQ8zRMm8",
        authDomain: "temp-crud-85ba9.firebaseapp.com",
        databaseURL: "https://temp-crud-85ba9-default-rtdb.firebaseio.com",
        projectId: "temp-crud-85ba9",
        storageBucket: "temp-crud-85ba9.firebasestorage.app",
        messagingSenderId: "990504243112",
        appId: "1:990504243112:web:69f2117ad0ffc9ca1f579d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const myName = prompt("Enter Your Name");

    const messagesRef = ref(db, "messages");

    // 메시지 수신
    onChildAdded(messagesRef, (snapshot) => {

        const data = snapshot.val();

        let html = `
            <li id="message-${snapshot.key}">
        `;

        if (data.sender === myName) {
            html += `
                <button
                    class="delete-btn"
                    data-id="${snapshot.key}">
                    Delete
                </button>
            `;
        }

        html += `
            <strong>{ ${data.sender} }</strong>
            : ${data.message}
            </li>
        `;

        document
        .getElementById("messages")
        .insertAdjacentHTML("beforeend", html);

        const btn = document.querySelector(
            `[data-id="${snapshot.key}"]`
        );

        if (btn) {
            btn.addEventListener("click", () => {
                deleteMessage(snapshot.key);
            });
        }

        const chatbox = document.getElementById("chatbox");
        chatbox.scrollTop = chatbox.scrollHeight;
    });

    // 메시지 삭제
    async function deleteMessage(messageId) {

        try {
            await remove(
                ref(db, "messages/" + messageId)
            );
        } catch (e) {
            console.error(e);
        }
    }

    // 삭제 감지
    onChildRemoved(messagesRef, (snapshot) => {

        const el = document.getElementById(
            "message-" + snapshot.key
        );

        if (el) {
            el.innerHTML =
                "<i>This message has been removed</i>";
        }
    });

    // 메시지 전송
    async function sendMessage() {

        const input =
                  document.getElementById("message");

        const message = input.value.trim();

        if (!message) return;

        try {

            const newMessageRef =
                      push(messagesRef);

            await set(newMessageRef, {
                sender: myName,
                message: message
            });

            input.value = "";

        } catch (e) {
            console.error(e);
        }
    }

    document
    .getElementById("chatForm")
    .addEventListener("submit", async (e) => {

        e.preventDefault();
        await sendMessage();

    });

</script>

</body>
</html>
